services:
  django:
    build:
      context: .
      dockerfile: ./dev/django.Dockerfile
    command: [
      "./manage.py",
      "runserver_plus", "0.0.0.0:8000"
    ]
    # Log printing is enhanced by a TTY
    tty: true
    working_dir: /home/vscode/bats-ai
    env_file: ./dev/.env.docker-compose
    volumes:
      - .:/home/vscode/bats-ai
      - pkg_cache:/home/vscode/pkg-cache
    ports:
      - 8000:8000
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy

  celery:
    build:
      context: .
      dockerfile: ./dev/django.Dockerfile
    command: [
      "uv", "run",
      "--extra" ,"tasks",
      "celery",
      "--app", "bats_ai.celery",
      "worker",
      "--loglevel", "INFO",
      "--without-heartbeat"
    ]
    # uv progress doesn't display properly with a Docker TTY
    tty: false
    working_dir: /home/vscode/bats-ai
    env_file: ./dev/.env.docker-compose
    volumes:
      - .:/home/vscode/bats-ai
      - pkg_cache:/home/vscode/pkg-cache
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy

  client:
    image: node:24.14.1
    working_dir: /app
    command: >
      sh -c "
        npm install &&
        npm run dev -- --host 0.0.0.0
      "
    ports:
      - 8080:8080
    volumes:
      - ./client:/app
      - /app/node_modules
    env_file:
      - ./dev/.env.docker-compose

volumes:
  pkg_cache:
