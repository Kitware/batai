version: '3'
services:
  postgres:
    image: postgis/postgis:latest
    environment:
      - POSTGRES_DB=${DJANGO_DATABASE_NAME:-django}
      - POSTGRES_PASSWORD=${DJANGO_DATABASE_PASSWORD:-postgres}
    ports:
      - ${DOCKER_POSTGRES_PORT-5432}:5432
    volumes:
      - postgres:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:management
    ports:
      - ${DOCKER_RABBITMQ_PORT-5672}:5672
      - ${DOCKER_RABBITMQ_CONSOLE_PORT-15672}:15672
    volumes:
      - rabbitmq:/var/lib/rabbitmq/mnesia

  minio:
    image: minio/minio:latest
    # When run with a TTY, minio prints credentials on startup
    tty: true
    command: ["server", "/data", "--console-address", ":${DOCKER_MINIO_CONSOLE_PORT-9001}"]
    environment:
      - MINIO_ROOT_USER=${DJANGO_MINIO_STORAGE_ACCESS_KEY:-minioAccessKey}
      - MINIO_ROOT_PASSWORD=${DJANGO_MINIO_STORAGE_SECRET_KEY:-minioSecretKey}
    ports:
      - ${DOCKER_MINIO_PORT-9000}:9000
      - ${DOCKER_MINIO_CONSOLE_PORT-9001}:9001
    volumes:
      - minio:/data

  mlflow:
    build:
      context: .
      dockerfile: ./dev/mlflow.Dockerfile
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=${DJANGO_MINIO_STORAGE_ACCESS_KEY:-minioAccessKey}
      - AWS_SECRET_ACCESS_KEY=${DJANGO_DATABASE_PASSWORD:-minioSecretKey}
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri postgresql://postgres:postgres@postgres:5432/mlflow --artifacts-destination s3://mlflow --default-artifact-root s3://mlflow

#   mlflow:
#     image: ghcr.io/mlflow/mlflow:latest
#     ports:
#       - "5000:5000"
#     environment:
#       - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
#       - AWS_ACCESS_KEY_ID=${DJANGO_MINIO_STORAGE_ACCESS_KEY:-minioAccessKey}
#       - AWS_SECRET_ACCESS_KEY=${DJANGO_DATABASE_PASSWORD:-minioSecretKey}
#     command: bash -c "python3 -m pip install psycopg2-binary boto3 && mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri postgresql://postgres:postgres@postgres:5432/mlflow --artifacts-destination s3://mlflow --default-artifact-root s3://mlflow"

volumes:
  postgres:
  sourcedb:
  minio:
  rabbitmq:
